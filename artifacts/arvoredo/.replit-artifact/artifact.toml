kind = "web"
previewPath = "/"
title = "Arvoredo PDV"
version = "1.0.0"
id = "artifacts/arvoredo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25500

[services.development]
run = "pnpm --filter @workspace/arvoredo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arvoredo", "run", "build" ]
publicDir = "artifacts/arvoredo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25500"
BASE_PATH = "/"
