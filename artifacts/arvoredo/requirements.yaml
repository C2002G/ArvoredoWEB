packages:
  "zustand": "Global state management for the POS cart"
  "date-fns": "Date formatting and manipulation"
  "lucide-react": "Icons for the UI"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes"

notes:
  - The API path base is /api.
  - Using generated Orval hooks from @workspace/api-client-react.
  - Zustand is used for the complex Point of Sale (PDV) cart state.
  - Custom modals are implemented using fixed positioned overlays to guarantee zero dependency issues with external UI libraries.
